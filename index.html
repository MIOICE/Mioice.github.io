<!DOCTYPE html>

    <title>我的个人主页</title>

<body>

    <header class="header">
        <div class="avatar">

        </div>

        <p class="subtitle">一名热爱编程的开发者 | 前端 / Python 爱好者</p>
        <div class="contact">

            <a href="mailto:你的邮箱@xxx.com">邮箱</a>

            <div class="project-item">

                <a href="https://github.com/你的用户名/spider" target="_blank">查看源码</a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 张三的个人主页 | 托管于 GitHub Pages</p>
